syntax = "proto3";

package authen.v1;

option go_package = "github.com/jonathan-chery/authen-proto/pkg/proto/authen/v1";

message Identity {
  string id = 1;
  string key_id = 2;
  string label = 3;
  repeated string roles = 4;
  repeated string scopes = 5;
}

message ErrorDetail {
  string code = 1;
  string message = 2;
  map<string, string> details = 3;
}

message Pagination {
  int32 offset = 1;
  int32 limit = 2;
}

message Empty {}